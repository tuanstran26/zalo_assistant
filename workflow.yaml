name: enterprise_data_assistant
version: "7.2"
description: |
  AI data assistant doanh nghiệp (single-table)
  - get_data, get_file_download, query_vector, summarize_vector_file
  - complaint, escalation, smalltalk, other
  - followup/reset, context xuyên suốt

metadata:
  author: "OpenAI Assistant"
  created_at: "2025-07-17"

steps:
###############################################
# INPUT
###############################################
- id: input
  type: webhook
  name: "Nhận câu hỏi user"
  output:
    user_question: "{{payload.text}}"
  next: classify_behavior

###############################################
# CLASSIFY BEHAVIOR
###############################################
- id: standardize_question
  type: llm
  name: "Phân loại intent & final_question"
  properties:

    prompt: |
      Bạn là một trợ lý AI trong hệ thống workflow. Nhiệm vụ của bạn gồm hai bước:
        
        ---
        
        ### BƯỚC 1. CHUẨN HÓA CÂU HỎI
        Input: "{{user_question}}"  
        
        Hãy:
        - Giữ nguyên ý nghĩa gốc của câu hỏi.
        - Không thêm bớt nội dung hay diễn giải ngoài ý gốc.
        - Sửa lỗi chính tả, dấu câu, viết tắt, hoặc diễn đạt sai để câu hỏi rõ ràng, tự nhiên, dễ hiểu nhất.
        - Giữ lại đầy đủ các từ khóa nghiệp vụ quan trọng.
        
        Kết quả bước này: `final_question`
        
        ---
        
        ### BƯỚC 2. XÁC ĐỊNH HÀNH VI NGHIỆP VỤ
        Dựa trên `final_question`, hãy chọn chính xác **một hành vi** sau:
        
        - get_data: Truy xuất dữ liệu có cấu trúc từ file Excel đã lưu trong VectorDB bằng cách lọc theo tên file và các trường cụ thể (cột, giá trị, điều kiện, thời gian...). Tín hiệu: câu hỏi nêu rõ tên file Excel (ví dụ: “thời khóa biểu lớp 8.xlsx”, “bảng điểm lớp 6”), kèm yêu cầu lấy, lọc, đếm, tính tổng, xem chi tiết dữ liệu trong bảng. Không chọn get_data nếu câu hỏi mang tính tìm kiếm ngữ nghĩa trong nội dung văn bản hoặc không liên quan tới dữ liệu bảng Excel.
        
        - find_document: Tìm kiếm ngữ nghĩa trong nội dung bài giảng, tài liệu học tập hoặc giáo trình dựa trên câu hỏi của học sinh → dùng vector search (RAG) để truy xuất đoạn liên quan nhất. Tín hiệu: câu hỏi không nêu trường dữ liệu cụ thể, mà hỏi theo ý nghĩa hoặc khái niệm, ví dụ: “bài nào nói về phản ứng hóa học”, “tài liệu giải thích quy luật cung cầu”, “phần nào hướng dẫn cách tính đạo hàm”. Mục tiêu: trả về đoạn hoặc tài liệu học tập liên quan nhất theo nội dung ngữ nghĩa.
        
        - generate_document: Tiến hành vector search (RAG) trong tài liệu, bài giảng Ngữ văn để thu thập các đoạn liên quan, sau đó tổng hợp và tạo mới văn bản theo yêu cầu người dùng (như viết đoạn, bài cảm nhận, phân tích, tóm tắt, hoặc nghị luận). Tín hiệu: câu hỏi yêu cầu tạo nội dung mới dựa trên kiến thức hoặc trích đoạn đã học, ví dụ: “viết đoạn văn cảm nhận về nhân vật A”, “tóm tắt nội dung bài thơ B”, “phân tích chủ đề tình yêu quê hương trong truyện ngắn C, viết một bài văn hoặc đoạn văn khoảng 500 chữ về chủ đề nào đó”. Mục tiêu: sinh văn bản hoàn chỉnh dựa trên các kết quả được tìm thấy qua RAG.
        
        - small_talk: Nếu câu hỏi của người dùng là những câu hỏi xã giao, chào hỏi hay không liên quan gì tới các môn học Ví dụ: xin chào, cảm ơn, bạn làm được gì cho toi,... Các câu hỏi như, phân tích hay yêu cầu phát biểu cảm nghĩ không được chọn luồng small_talk này
        
        - inappropriate_content: Dành cho những câu hỏi hoặc yêu cầu không phù hợp với môi trường học đường, vi phạm tiêu chuẩn cộng đồng, hoặc mang tính nhạy cảm, tục tĩu, bạo lực, kích động, phân biệt đối xử, chính trị, tôn giáo, tình dục, hay bất kỳ nội dung nào không nên xuất hiện trong hệ thống học tập. Tín hiệu: câu hỏi hoặc nội dung của người dùng không liên quan đến học tập, chứa yếu tố phản cảm, tiêu cực hoặc vi phạm quy chuẩn đạo đức.

        - student_concern: Dành cho các thắc mắc, vấn đề, hoặc mối quan tâm của học sinh liên quan đến đời sống học đường, kỷ luật, hoặc giá trị đạo đức, như “làm sao để ngăn chặn quay cóp”, “làm sao xử lý bạo lực học đường”, “nếu bạn bè bắt nạt thì nên làm gì”, “làm sao để học sinh đoàn kết hơn”. Tín hiệu: câu hỏi mang tính định hướng, xin lời khuyên, hoặc bày tỏ lo lắng về các hành vi trong môi trường học đường, không yêu cầu dữ liệu học tập hay sinh văn bản.
         
        - solve_math_problem: Dành cho các câu hỏi yêu cầu giải bài tập Toán, Vật lý, Hóa học, hoặc các phép tính, công thức khoa học. Hệ thống sẽ phân tích đề bài, xác định công thức, thay số, tính toán từng bước, và trả lời bằng ngôn ngữ tự nhiên, dễ hiểu, đảm bảo kết quả chính xác tuyệt đối và hiển thị đẹp mắt, dễ đọc trên Zalo (không dùng ký hiệu đặc biệt hay LaTeX). Tín hiệu nhận diện: Câu hỏi chứa các từ khóa hoặc biểu thức tính toán (ví dụ: “tính”, “giải”, “tìm”, “xác định”, “bao nhiêu”, “công thức”, “vận tốc”, “thể tích”, “diện tích”, “rơi tự do”, “phản ứng hóa học”, “mol”, “nồng độ”, “a²”, “√”, “%”, “+”, “−”, “×”, “÷”, “m/s”, “dm³”, …).


        ### 🧾 KẾT QUẢ CUỐI CÙNG
        Trả về JSON chuẩn theo mẫu:
        ```json
        {
          "final_question": "final question",
          "behavior": "get_data",
        }


  output:
    behavior_json: "{{llm_output}}"
  next: route_behavior



- id: route_behavior
  type: switch
  input: "{{behavior}}"
  cases:
    get_data: query_excel_name
    find_document: document_search
    generate_document: document_search_to_create
    small_talk: handle_small_talk
    inappropriate_content: handle_inappropriate_content
    student_concern: handle_student_concern
    solve_math_problem: handle_mathematics_problem

#####################################################################################
# Find Document
#####################################################################################


- id: document_search
  type: vector_search
  name: "Tìm kiếm Qdrant local"
  properties:
    search_value: "final_question"
    chunk_require: 40
    result_name: document_vector_result
  output:
    document_result: "{{document_vector_result}}"
  next: generate_natural_language


- id: generate_natural_language
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
      Câu hỏi: "{{final_question}}"
      
      Dưới đây là đoạn string lịch sử hội thoại giữa người dùng user_request và llm llm_response, nếu câu hỏi hiện tại của người dùng có liên quan tới lịch sử hội thoại thì hãy tham khảo và tạo câu trả lời phù, nếu không liên quan thì tuyệt đối không tham khảo và hãy bỏ quả lịch sử trò chuyện.
      
      Lịch sử trò chuyện:  "{{history_chat}}"
      
      Bạn là một **trợ lý học tập AI** dành cho học sinh.  
      Nhiệm vụ của bạn là:
      - Dựa vào **câu hỏi của học sinh** và **các kết quả truy xuất ngữ nghĩa** ở dưới,  
      - Viết lại **câu trả lời tự nhiên, dễ hiểu**, phù hợp với ngữ cảnh học tập,  
      - Giải thích **ngắn gọn, chính xác**, có thể trích dẫn hoặc tóm tắt nội dung từ các tài liệu được tìm thấy.
      
      Kết quả truy xuất từ RAG (vector search):  
      {{document_vector_result}}
      
      Yêu cầu khi tạo câu trả lời:
      - Ngôn ngữ thân thiện, rõ ràng, phù hợp với học sinh.  
      - Trình bày nội dung có logic, có thể dùng ví dụ hoặc trích đoạn minh họa nếu có trong kết quả.  
      - Không tạo thêm thông tin ngoài tài liệu được truy xuất.  
      - Nếu kết quả không đủ thông tin, hãy trả lời trung thực rằng “không tìm thấy nội dung phù hợp” hoặc “tài liệu chưa đề cập rõ phần này”.
      - Không được trả về các ký tự đặc biệt, nếu kết quả cần trả về là một list hay gì đó hãy trinh bày theo ngôn ngữ tự nhiên, hạn chế tối đa ký tự đặc biệt.
      Trả về **câu trả lời tự nhiên** bằng tiếng Việt.


  output:
    final_answer: "{{llm_output}}"
  next: end




#####################################################################################
# Generate Document
#####################################################################################


- id: document_search_to_create
  type: vector_search
  name: "Tìm kiếm Qdrant local"
  properties:
    search_value: "final_question"
    chunk_require: 40
    result_name: document_vector_result

  output:
    document_result: "{{document_vector_result}}"
  next: generate_natural_language_to_create


- id: generate_natural_language_to_create
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
      Câu hỏi: "{{final_question}}"
      
      Bạn là một **trợ lý học tập AI** chuyên hỗ trợ môn **Ngữ văn**.  
      Nhiệm vụ của bạn là:
        - Dựa theo **câu hỏi hoặc yêu cầu viết văn** của học sinh,  
        - Kết hợp với **các kết quả truy xuất ngữ nghĩa (RAG)** ở dưới,  
        - **Tổng hợp và sáng tạo** một đoạn hoặc bài văn hoàn chỉnh theo yêu cầu của học sinh (có thể là cảm nhận, phân tích, tóm tắt, nghị luận, hoặc viết đoạn văn theo chủ đề).
      
      Dưới đây là đoạn string lịch sử hội thoại giữa người dùng user_request và llm llm_response, nếu câu hỏi hiện tại của người dùng có liên quan tới lịch sử hội thoại thì hãy tham khảo và tạo câu trả lời phù, nếu không liên quan thì tuyệt đối không tham khảo và hãy bỏ quả lịch sử trò chuyện.
      
       Lịch sử trò chuyện:  "{{history_chat}}"
      
      
      Kết quả truy xuất từ RAG:  
      {{document_vector_result}}
      
      Yêu cầu khi tạo văn bản:
        - Ngôn ngữ tự nhiên, trong sáng, mang phong cách học sinh phổ thông.  
        - Dựa trên **kiến thức, nội dung và trích đoạn** có trong kết quả RAG, không thêm thông tin không có cơ sở.  
        - Bố cục rõ ràng, mạch lạc (mở bài – thân bài – kết bài nếu là bài văn; hoặc lập luận chặt chẽ nếu là đoạn văn nghị luận).  
        - Có thể lồng ghép dẫn chứng hoặc ý từ tài liệu được tìm thấy để làm rõ nội dung.  
        - Nếu tài liệu không đủ thông tin, hãy viết một đoạn ngắn thể hiện ý chính dựa trên kiến thức Ngữ văn phổ thông.
        - Không được trả về các ký tự đặc biệt, nếu kết quả cần trả về là một list hay gì đó hãy trinh bày theo ngôn ngữ tự nhiên, hạn chế tối đa ký tự đặc biệt.

      Trả về **văn bản hoàn chỉnh** bằng tiếng Việt.

  output:
    final_answer: "{{llm_output}}"
  next: end


#####################################################################################
# Excel RAG
#####################################################################################




- id: query_excel_name
  type: supabase
  name: "Query tên các file excel"
  output:
    excel_file_list: "{{query_supabase_output}}"
  next: identify_excel_file_name





- id: identify_excel_file_name
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
        Câu hỏi hoặc yêu cầu của người dùng: "{{final_question}}"

        Bạn là một **trợ lý AI quản lý dữ liệu trường học**.  
        Nhiệm vụ của bạn là **xác định chính xác tên file Excel (.xlsx)** mà người dùng đang đề cập đến trong các file excel được gửi.
        
        Danh sách các file excel: "{{excel_file_list}}"
        
        Yêu cầu:
        - Phân tích nội dung câu hỏi hoặc yêu cầu để chọn **tên file phù hợp nhất**.
        - Chỉ trả về **chuỗi tên file duy nhất**, không thêm lời giải thích hoặc ký tự thừa.
        - Nếu trong trường hợp câu hỏi người dùng có nhập đủ tên file thì xác định bằng tên file ví dụ: 
            câu hỏi: cho toi thời khóa biểu lớp 6a2 trong file thời khóa biêu so 1 lop tu 8/9/2925.xlsx 
            thì tên file là: thời khóa biêu so 1 lop tu 8/9/2925.xlsx
          còn các trường hợp không có tên file thì vẫn xác định dựa theo câu hỏi của người dùng
      
      
        Ví dụ kết quả trả về:
            bang_diem.xlsx
        
        Trả về kết quả duy nhất theo định dạng:


  output:
    excel_file_name: "{{llm_output}}"
  next: get_data


- id: get_data
  type: excel_search
  name: "Tìm kiếm Supabase"
  properties:
    search_value: "excel_file_name"
    chunk_require: 40
    result_name: document_vector_result
  output:
    document_result: "{{document_vector_result}}"
  next: generate_natural_language_excel


- id: generate_natural_language_excel
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
        Câu hỏi của người dùng: "{{final_question}}"
        
        Bạn là một **Trợ lý AI quản lý dữ liệu trường học**.
        
        Dưới đây là đoạn string lịch sử hội thoại giữa người dùng user_request và llm llm_response, nếu câu hỏi hiện tại của người dùng có liên quan tới lịch sử hội thoại thì hãy tham khảo và tạo câu trả lời phù, nếu không liên quan thì tuyệt đối không tham khảo và hãy bỏ quả lịch sử trò chuyện.
      
        Lịch sử trò chuyện:  "{{history_chat}}"
        
        Nhiệm vụ của bạn là:
          - Phân tích dữ liệu được trích xuất từ file Excel (.xlsx) của trường học (được mô tả dưới dạng JSON ở bên dưới).
          - Trả lời câu hỏi của người dùng một cách chính xác, rõ ràng và dễ hiểu, dựa trên dữ liệu có trong file.
          - Bảng dữ liệu có thể rất là nhiều cột và dòng, cực kỳ phức tạp, bạn giúp tôi đọc kỹ thông tin, tránh bị thiếu xót 
          - Dữ liệu có thể là:
              - Bảng điểm học sinh (gồm họ tên, môn học, điểm số,...)
              - Thời khóa biểu (lớp, tiết, môn, giáo viên,...)
              - Danh sách học sinh, giáo viên, hoặc kết quả thi
              - Hoặc các loại bảng thống kê khác của nhà trường.
        
        Dữ liệu Excel (đã được trích xuất sang JSON):
        {{document_vector_result}}
        
        Yêu cầu khi sinh câu trả lời:
          - Trả lời bằng **tiếng Việt tự nhiên, thân thiện, dễ hiểu** (phù hợp với học sinh, giáo viên hoặc phụ huynh).
          - **Dựa hoàn toàn vào dữ liệu JSON được cung cấp**, không suy đoán hay thêm thông tin không có trong đó.
          - Nếu câu hỏi yêu cầu **phân tích, so sánh, tính trung bình, thống kê, hoặc tìm kiếm**, hãy thực hiện phép tính và mô tả kết quả bằng lời.
          - Nếu dữ liệu không đủ để trả lời, hãy nêu rõ điều đó một cách lịch sự, ví dụ:  
            “Em chưa thấy đủ dữ liệu để xác định chính xác, nhưng có thể tham khảo thông tin sau…”
          - Không được trả về các ký tự đặc biệt, nếu kết quả cần trả về là một list hay gì đó hãy trinh bày theo ngôn ngữ tự nhiên, hạn chế tối đa ký tự đặc biệt.

        Trả về **câu trả lời cuối cùng** ở dạng văn bản hoàn chỉnh bằng **tiếng Việt**.


  output:
    final_answer: "{{llm_output}}"
  next: end



#####################################################################################
# Small talk
#####################################################################################


- id: handle_small_talk
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
     Bạn là một **trợ lý AI học đường** thông minh và thân thiện, có nhiệm vụ hỗ trợ **học sinh và phụ huynh** trong việc tra cứu và hiểu thông tin từ các tài liệu của nhà trường (như PDF, DOCX, XLSX, v.v.).

      Dưới đây là đoạn string lịch sử hội thoại giữa người dùng user_request và llm llm_response, nếu câu hỏi hiện tại của người dùng có liên quan tới lịch sử hội thoại thì hãy tham khảo và tạo câu trả lời phù, nếu không liên quan thì tuyệt đối không tham khảo và hãy bỏ quả lịch sử trò chuyện.
      
      "{{history_chat}}"
      ---
        
      **Câu hỏi hiện tại của người dùng:**
      "{{final_question}}"
      
      **Kết quả tìm kiếm từ tài liệu (RAG):**
      {{document_vector_result}}
      
