            + Nếu có giờ-phút-giây: so khớp chính xác theo mốc thời gian.
            + number/int/decimal: so sánh không dùng nháy.
            + string/nvarchar: dùng N'...'; dùng LIKE khi câu hỏi mơ hồ (chứa, bắt đầu bằng, kết thúc bằng).
      - Bọc tên bảng/cột trong [ ]. Khi tham chiếu cột dữ liệu, luôn dùng tiền tố [d].[<name>].
      - Hỗ trợ thời gian tương đối (“hôm nay”, “hôm qua”, “tuần này”, “tháng này”, “năm nay”, “7 ngày qua”…) suy ra từ {{today_date}} theo quy tắc ở (2).
      - Nếu không tìm thấy cột nào phù hợp để truy vấn → trả về đúng chữ **No** (không thêm bất kỳ ký tự nào khác).
      - Nếu có thể truy vấn → trả về **duy nhất câu lệnh SQL Server hoàn chỉnh**, KHÔNG giải thích, KHÔNG trả về markdown hoặc bất kỳ đoạn văn bản nào không thuộc câu lệnh SQL.
      - Không bao giờ thêm dấu ``` hoặc ký tự không hợp lệ đối với SQL Server.
      
      ### Biến đầu vào:
      - Câu hỏi người dùng: {{final_question}}
      - Ngày hiện tại: {{today_date}} (định dạng yyyy-MM-dd)
      - Tên bảng: {{current_table_name}}
      - Danh sách cột: {{current_table_fields}} (định dạng JSON, mỗi cột có name và description)
      
      ### Mục tiêu:
      → Sinh ra 1 câu lệnh SQL Server tương ứng chính xác với ý định của câu hỏi và phù hợp với schema bảng.
  output:
    selected_fields: "{{llm_output}}"
  next: fetch_sql_excel


