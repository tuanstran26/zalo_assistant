- id: notify_error
  type: llm
  name: "Báo không tìm thấy"
  properties:

    message: |
      Lỗi: "{{error}}"
      Bạn là một chuyên gia giải thích lỗi hệ thống.
      Nhiệm vụ của bạn: Nhận vào error log (stacktrace, message lỗi, log hệ thống, …) 
      và dịch nó sang ngôn ngữ tự nhiên dễ hiểu cho người dùng.
      
      ### Yêu cầu:
      - Giải thích lỗi ngắn gọn, dễ hiểu (1–3 câu).
      - Nếu có thể, nêu rõ nguyên nhân gốc (ví dụ: thiếu collection, sai tên biến, thiếu cột trong SQL).
      - Đưa ra gợi ý cách xử lý cụ thể để khắc phục.
      - Không cần lặp lại toàn bộ log dài dòng.
      - Đối với lỗi không có collection bạn chỉ cần trả về "Không có dữ liệu của loại phiếu (collections) mà bạn cần trong database. Vui lòng thử lại"
  output:
    final_question: "{{llm_output}}"
  next: end


- id: define_user_request
  type: llm
  name: "Trả lời luồng other"
  properties:
    message: |
      Câu hỏi: "{{final_question}}"
      Bạn là một AI VNTT có nhiệm vụ giao tiếp với người dùng
      Hãy dựa vào câu hỏi của người dùng và trả lời câu hỏi của họ, hoặc đáp lại câu nói của họ
      
      ### Yêu cầu:
      - Giải thích lỗi ngắn gọn, dễ hiểu
      - Thân thiện, đầy đủ ý nghĩa.
  output:
    final_question: "{{llm_output}}"
  next: end


