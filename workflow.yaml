# Mathematics Problem
#####################################################################################


- id: handle_mathematics_problem
  type: llm
  name: "Tạo câu trả lời theo ngôn ngữ tự nhiên"
  properties:
    model: gpt-4o
    prompt: |
     Bạn là một Trợ lý AI học tập thông minh, chuyên giúp học sinh, giáo viên và phụ huynh giải thích, hướng dẫn và tính toán các bài tập Toán, Vật lý, Hóa học, Sinh học, Tin học và các môn khoa học khác.
      
      Dưới đây là đoạn string lịch sử hội thoại giữa người dùng user_request và llm llm_response, nếu câu hỏi hiện tại của người dùng có liên quan tới lịch sử hội thoại thì hãy tham khảo và tạo câu trả lời phù hợp, nếu không liên quan thì tuyệt đối không tham khảo và hãy bỏ qua lịch sử trò chuyện.
      
      "{{history_chat}}"
      
      Hãy đọc kỹ yêu cầu của người dùng {{final_question}}, và tạo một câu trả lời chính xác, rõ ràng, dễ hiểu, trình bày thân thiện.
      
      Yêu cầu về phong cách và cấu trúc trả lời:
      
       - Chính xác tuyệt đối      
       - Dựa trên công thức, định luật, phản ứng, hoặc quy tắc đã được xác nhận.
       - Mọi phép tính phải được kiểm tra lại để đảm bảo không sai số.      
       - Trình bày rõ ràng, dễ đọc trên Zalo (không dùng ký tự đặc biệt hay ký hiệu LaTeX):      
       - Viết công thức bằng chữ cái thường, ví dụ:  Công thức: S = 1/2 * g * t^2      
       - Ngắt dòng hợp lý, có thể sử dụng gạch đầu dòng hoặc đánh số bước.      
       - Các bước tính toán nên trình bày theo dạng từng dòng, có chú thích.      
       - Giải thích ngắn gọn, có lý do và kết luận cuối cùng rõ ràng.      
       - Nếu câu hỏi thuộc về phân tích, so sánh, hoặc lý thuyết, hãy:      
          + Giải thích từng khái niệm dễ hiểu.      
          + Dẫn ra ví dụ minh họa nếu cần.      
          + Nếu không đủ dữ liệu để tính toán, hãy nói rõ ràng, ví dụ:      
           "Bài này thiếu thông tin về khối lượng riêng nên chưa thể tính chính xác, nhưng ta có thể nêu cách làm như sau..."
      
      Cấu trúc gợi ý cho câu trả lời Toán – Lý – Hóa:
      1. Phân tích đề bài: (viết ngắn gọn)
      2. Công thức sử dụng: (ghi công thức dạng văn bản dễ đọc)
      3. Thay số vào công thức:
         Ví dụ: S = 1/2 * 9.8 * (3^2) = 44.1 (m)
      4. Kết luận:
         → Vậy quãng đường vật rơi được là 44,1 mét.
      
      Ví dụ mẫu (phiên bản dễ đọc cho Zalo)
      
      Ví dụ 1 – Toán học:
      Câu hỏi: Tính độ dài cạnh hình vuông có diện tích 53052 m².
      
      Trả lời:
      
      Công thức tính diện tích hình vuông: A = a²
      
      Thay số: a² = 53052
      
      Lấy căn bậc hai hai vế: a = √53052 ≈ 230.3
      
      Kết luận:
      → Độ dài cạnh hình vuông là khoảng 230,3 mét.
      
      Ví dụ 2 – Vật lý:
      Câu hỏi: Một vật rơi tự do trong 3 giây. Hỏi vật rơi được quãng đường bao nhiêu (lấy g = 9,8 m/s²)?
      
      Trả lời:
      
      Công thức: S = 1/2 * g * t²
      
      Thay số: S = 1/2 * 9,8 * (3²)
      
      Tính: S = 4,9 * 9 = 44,1
      
      Kết luận:
      → Vật rơi được quãng đường 44,1 mét sau 3 giây.
      
      Ví dụ 3 – Hóa học:
      Câu hỏi: Viết phương trình hóa học giữa natri và nước.
      
      Trả lời:
      Phản ứng giữa natri (Na) và nước (H₂O) xảy ra mãnh liệt, tạo ra natri hiđroxit và khí hiđro.
      
      Phương trình hóa học:
      Na + H₂O → NaOH + H₂↑
      
      Cân bằng:
      2Na + 2H₂O → 2NaOH + H₂↑
      
      → Sản phẩm là dung dịch NaOH và khí hiđro.

      

  output:
    final_answer: "{{llm_output}}"
  next: end













#####################################################################################
# Get Data: Generate SQL -> Fetch SQL API -> Natural Language -> Return final result
#####################################################################################

- id: generate_sql_query
  type: llm
  name: "Xác định fields"
  properties:

    prompt: |
     Bạn là trợ lý AI nội bộ, có nhiệm vụ sinh ra câu lệnh SQL (SQL Server) từ câu hỏi tự nhiên của người dùng.

      ### Yêu cầu:
      - Phân tích kỹ câu hỏi của người dùng.
      - Dựa vào danh sách các cột (fields) được cung cấp bên dưới (dưới dạng JSON).
      - Hiểu nghĩa cột qua `description`, nhưng viết SQL bằng `name`. Chỉ lọc/truy vấn trên cột của bảng alias `d` dựa vào danh sách cột được cấp (không bịa cột).
      - Phải xét đến kiểu dữ liệu `type` của mỗi cột để đảm bảo câu SQL đúng về cú pháp và logic, tuân thủ `type` khi sinh điều kiện:
           + datetime/date:
            + Nếu lọc theo 1 NGÀY (không giờ): dùng khoảng sargable [d].[col] >= 'YYYY-MM-DDT00:00:00' AND [d].[col] < DATEADD(day,1,'YYYY-MM-DDT00:00:00')
            + Nếu khoảng ngày: [d].[col] >= start AND [d].[col] < DATEADD(day,1,end)
            + Nếu có giờ-phút-giây: so khớp chính xác theo mốc thời gian.
            + number/int/decimal: so sánh không dùng nháy.
            + string/nvarchar: dùng N'...'; dùng LIKE khi câu hỏi mơ hồ (chứa, bắt đầu bằng, kết thúc bằng).
      - Bọc tên bảng/cột trong [ ]. Khi tham chiếu cột dữ liệu, luôn dùng tiền tố [d].[<name>].
      - Hỗ trợ thời gian tương đối (“hôm nay”, “hôm qua”, “tuần này”, “tháng này”, “năm nay”, “7 ngày qua”…) suy ra từ {{today_date}} theo quy tắc ở (2).
      - Nếu không tìm thấy cột nào phù hợp để truy vấn → trả về đúng chữ **No** (không thêm bất kỳ ký tự nào khác).
      - Nếu có thể truy vấn → trả về **duy nhất câu lệnh SQL Server hoàn chỉnh**, KHÔNG giải thích, KHÔNG trả về markdown hoặc bất kỳ đoạn văn bản nào không thuộc câu lệnh SQL.
      - Không bao giờ thêm dấu ``` hoặc ký tự không hợp lệ đối với SQL Server.
      
      ### Biến đầu vào:
      - Câu hỏi người dùng: {{final_question}}
      - Ngày hiện tại: {{today_date}} (định dạng yyyy-MM-dd)
      - Tên bảng: {{current_table_name}}
      - Danh sách cột: {{current_table_fields}} (định dạng JSON, mỗi cột có name và description)
      
      ### Mục tiêu:
      Sinh ra 1 câu lệnh SQL Server tương ứng chính xác với ý định của câu hỏi và phù hợp với schema bảng.
      Và chỉ trả về đúng câu lệnh sql thôi
    handle_error: notify_sql
  output:
    selected_fields: "{{llm_output}}"
  next: fetch_sql_data


- id: fetch_sql_data
  type: sql_result
  name: get_sql_data
  properties:
    endpoint: "https://workflow.becawork.vn/api/apikey/AI/QuerySQL"
    method: POST
    headers:
      Content-Type: application/json
    payload:
      username: "readonly_user"
      password: "-ufR0NWc5B;c91CyKnD^"
      sql: "{{selected_fields}}"
    handle_error: notify_error
  output:
    sql_result: "{{api_response}}"
  next: present_sql_result



#############################################################################################################
# Query vector: Identify metadata -> Identity key word -> Vector search -> Natural language -> Return result
#############################################################################################################

- id: metadata_identify
  type: llm
  name: "Xác định metadata trong user request"
  properties:

    prompt: |
      Bạn là một trợ lý AI nội bộ doanh nghiệp.

      Nhiệm vụ của bạn là sinh ra **filter Qdrant** từ câu hỏi tự nhiên của người dùng, dựa trên metadata các trường (column) được cung cấp.
      
      ---
      ### Câu hỏi người dùng: "{{user_question}}"
      
      ### Hướng dẫn xử lý:
      
      1. Phân tích kỹ user_question để xác định các điều kiện lọc, cụ thể:
         - Giá trị chính xác (match)
         - Khoảng thời gian (range: gt, lt, gte, lte)
         - Các giá trị liệt kê (in)
         - Tùy theo kiểu dữ liệu
      
      2. Chỉ sử dụng các trường có trong metadata. Nếu không có trường nào phù hợp với câu hỏi, trả về đúng "No".
      
      3. Nếu có trường phù hợp, chỉ trả về **filter Qdrant dạng JSON hợp lệ duy nhất**, **không thêm chú thích, không giải thích thêm.**
      
      ---
      Đây là ngày hôm nay: {{today_date}}
      ### 
      Metadata các trường: {{current_table_fields}}
      
      
      ### ĐỊNH DẠNG KẾT QUẢ TRẢ VỀ
      Ví dụ: "user_question": "liệt cho tôi danh sách người đề nghị là dũng trong tháng 6"
    
      json
      {
        "should": [
          { "key": "NguoiDeNghi", "match": { "value": "dũng" } },
          { "key": "NgayXuat", "range": { "gte": "2024-06-01", "lt": "2024-07-01" } }
        ]
      }
  output:
    metadata_identity_result: "{{llm_output}}"
  next: find_key_word


- id: find_key_word
  type: llm
  name: "Xác định từ khóa trong câu hỏi người dùng"
  properties:

    prompt: |
      Bạn là một AI hỗ trợ truy vấn tìm kiếm ngữ nghĩa (semantic search).
      Nhiệm vụ của bạn là rút trích ra các từ khóa chính (keywords) mang ý nghĩa trọng tâm từ bất kỳ câu hỏi hoặc yêu cầu nào của người dùng.
      
    
      Yêu cầu:
      
      Tập trung vào các danh từ chính, cụm danh từ, từ khóa chứa ý nghĩa nghiệp vụ hoặc pháp lý quan trọng.
      Loại bỏ các từ mang tính xã giao, câu hỏi phụ trợ hoặc không cần thiết cho mục đích tìm kiếm.
      Kết quả trả về ở định dạng JSON, mảng các chuỗi, không giải thích thêm.
      Và nối chuỗi các keyword lại giúp tôi
      Ví dụ 1:
      Câu hỏi: "Tôi muốn biết điều kiện thanh lý trong hợp đồng mua bán giữa công ty A và công ty B là gì?"
      Key word là : ["điều kiện thanh lý", "hợp đồng mua bán", "công ty A", "công ty B"]
      Kết quả:
      {
        "điều kiện thanh lý hợp đồng mua bán công ty A công ty B"
      }
      
      Ví dụ 2:
      Câu hỏi: "Có văn bản nào liên quan đến việc xử lý vi phạm hợp đồng bảo trì trong tháng 3 không?"
      Key word là: ["văn bản", "xử lý vi phạm", "hợp đồng bảo trì", "tháng 3"]
      Kết quả:
      {
        "văn bản xử lý vi phạm hợp đồng bảo trì tháng 3"
      }
      
      Bây giờ hãy xử lý câu hỏi sau:
      
      Câu hỏi: "{{final_question}}"
      Kết quả:
  output:
    main_key_words: "{{llm_output}}"
  next: document_search


- id: document_search
  type: vector_search
  name: "Tìm kiếm Qdrant local"
  properties:
    qdrant_url: "http://localhost:6333"
    collection_name: "qdrant_collection"
    search_value: "main_key_words"
    metadata_filter: "metadata_identity_result"
    chunk_require: 40
    return_fields:
      - "text"
    result_name: document_vector_result
    handle_error: notify_error
  output:
    document_result: "{{document_vector_result}}"
  next: generate_natural_language




